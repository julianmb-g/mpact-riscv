build_cmd: "bazel build --override_repository=com_google_mpact-sim=/workspace/louhi_ws/mpact-sim //..."
test_cmd: 'BAZEL_USE_LLVM_NATIVE_COVERAGE=1 GCOV=llvm-profdata bazel coverage --override_repository=com_google_mpact-sim=/workspace/louhi_ws/mpact-sim //... --instrumentation_filter=\".*\" --combined_report=lcov --experimental_generate_llvm_lcov --nocache_test_results && find bazel-testlogs/ -name "coverage.dat" -exec cat {} + > merged_coverage.info && genhtml --synthesize-missing --ignore-errors category,unsupported,empty,inconsistent,corrupt,source merged_coverage.info -o coverage_report/'
lint_cmd: "buildifier -r ."
setup_cmd: "sudo apt-get update && sudo apt-get install -y lcov"
